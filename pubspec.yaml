name: lifepilot
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  shared_preferences: ^2.5.5
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.4.0

  file_picker: ^10.3.7
  image_picker: ^1.2.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  cryptography: ^2.7.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  open_filex: ^4.7.0
  uuid: ^4.5.2
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/lifepilot_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/lifepilot_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/lifepilot_logo.png